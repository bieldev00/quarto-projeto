<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./style-projeto.css">
    <title>DevClub - Convert Money</title>
</head>

<body>
    <img class="logo" src="assets/logo-projeto.gif" alt="logo-DevClub-convert-money">


    <main>
        <label> <!-- serve para agrupar elementos, usada para associar texto a elementos de formulário -->
            converter <b>de:<b>
                    <select> <!-- elemento de formulário que cria um menu suspenso -->
                        <option> <!-- elemento de formulário que define uma opção em um menu suspenso -->
                            R$ Real Brasileiro
                        </option>
                    </select>
        </label>

        <label> <!-- serve para agrupar elementos, usada para associar texto a elementos de formulário -->
            converter <b>para:<b>
                    <select class="currency-select">
                        <option value="dolar">
                            US$ Dólar Americano
                        </option>
                        <option value="euro">
                            € euro
                        </option>

                    </select>
        </label>

        <label>
            valor
            <input class="input-currency" placeholder="R$10.000,00">
        </label>

        <button class="convert-button">converter</button>

        <section>
            <div class="currency-box">
                <img class="logo-bandeira" src="./assets/logo-brasil.png" alt="logo-moeda-a-converter">
                <p class="currency">Real</p>
                <p class="currency-value-to-convert">R$ 0,00</p>
            </div>

            <img class="arrow-img" src="./assets/seta-roxa.png" alt="seta-roxa-para-converter">

            <div class="currency-box">
                <img class="currency-img" src="./assets/logo-EUA.png" alt="logo-moeda-a-convertida">
                <p class="currency" id="currency-name">Dólar Americano</p>
                <p class="currency-value">US$ 0.00</p>
            </div>
        </section>

    </main>

</body>
<script src="./scripts.js"></script>

</html>
